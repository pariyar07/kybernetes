# Codex UI metadata + invocation policy (optional; Codex-specific)
# Safe to delete if you don't use the Codex app surface.
display_name: Kybernetes Loop Governor
short_description: Adaptive loop controller for durable, auditable, feedback-controlled runs.
default_prompt: >-
  Act as the Kybernetes loop governor per references/goal-checklist.md. Check loop
  readiness, choose loop altitude, build the execution profile, create or read a
  control record when needed, and ask adaptive questions before significant work.
policy:
  # This skill can coordinate workers and long-running state. Keep invocation explicit
  # until pressure scenarios prove implicit triggering is safe.
  allow_implicit_invocation: false
