name: Validate Skills

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  validate-skills:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Require skill entrypoints
        run: |
          ruby <<'RUBY'
          require "yaml"

          failed = false

          Dir.glob("skills/*").sort.each do |dir|
            next unless File.directory?(dir)

            skill_file = File.join(dir, "SKILL.md")
            unless File.file?(skill_file)
              warn "Skill folder #{dir} is missing SKILL.md. Planned skills belong in docs/architecture/planned-skills.md."
              failed = true
              next
            end

            content = File.read(skill_file)
            match = content.match(/\A---\n(.*?)\n---\n/m)
            unless match
              warn "#{skill_file} is missing YAML frontmatter."
              failed = true
              next
            end

            begin
              frontmatter = YAML.safe_load(match[1], permitted_classes: [], aliases: false)
            rescue Psych::Exception => e
              warn "#{skill_file} has invalid YAML frontmatter: #{e.message}"
              failed = true
              next
            end

            name = frontmatter.fetch("name", nil)
            description = frontmatter.fetch("description", nil)

            unless name.is_a?(String) && name.start_with?("kybernetes:")
              warn "#{skill_file} must use a kybernetes:* frontmatter name."
              failed = true
            end

            unless description.is_a?(String) && !description.strip.empty?
              warn "#{skill_file} must include a non-empty frontmatter description."
              failed = true
            end
          end

          exit(failed ? 1 : 0)
          RUBY

      - name: Require pressure scenarios for skills
        run: |
          count="$(find tests/pressure-scenarios -type f -name '*.md' | wc -l | tr -d ' ')"
          if [ "$count" -lt 1 ]; then
            echo "At least one pressure scenario is required before publishing skill behavior."
            exit 1
          fi

      - name: Require control-loop vocabulary
        run: |
          grep -RIl "Execution Profile" skills tests docs examples README.md >/dev/null
          grep -RIl "control record" skills tests docs examples README.md >/dev/null
          grep -RIl "loop readiness" skills tests docs examples README.md >/dev/null
          grep -RIl "loop altitude\\|stay, down, up, stack" skills tests docs examples README.md >/dev/null
          grep -RIl "HITL\\|Human-In-The-Loop" skills tests docs examples README.md >/dev/null
          grep -RIl "impediment" skills tests docs examples README.md >/dev/null

      - name: Reject stale run artifact defaults
        run: |
          if grep -RIn \
            --exclude-dir=.git \
            --exclude-dir=.agent-runs \
            --exclude-dir=research \
            --exclude='validate-skills.yml' \
            -E "\\.agent-runs" skills docs examples tests README.md; then
            echo "Use .kybernetes/<slug>/ for Kybernetes run artifacts. .agent-runs may appear only in legacy cleanup context."
            exit 1
          fi

      - name: Reject committed Kybernetes run artifacts
        run: |
          if git ls-files '.kybernetes/*' | grep .; then
            echo ".kybernetes/ contains local run artifacts and must not be committed."
            exit 1
          fi
