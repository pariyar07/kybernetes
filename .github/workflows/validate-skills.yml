name: Validate Skills

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  validate-skills:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Require skill entrypoints
        run: |
          ruby <<'RUBY'
          require "yaml"

          failed = false

          Dir.glob("skills/*").sort.each do |dir|
            next unless File.directory?(dir)

            skill_file = File.join(dir, "SKILL.md")
            unless File.file?(skill_file)
              warn "Skill folder #{dir} is missing SKILL.md. Planned skills belong in docs/architecture/planned-skills.md."
              failed = true
              next
            end

            content = File.read(skill_file)
            match = content.match(/\A---\n(.*?)\n---\n/m)
            unless match
              warn "#{skill_file} is missing YAML frontmatter."
              failed = true
              next
            end

            begin
              frontmatter = YAML.safe_load(match[1], permitted_classes: [], aliases: false)
            rescue Psych::Exception => e
              warn "#{skill_file} has invalid YAML frontmatter: #{e.message}"
              failed = true
              next
            end

            name = frontmatter.fetch("name", nil)
            description = frontmatter.fetch("description", nil)

            unless name.is_a?(String) && name.start_with?("kybernetes:")
              warn "#{skill_file} must use a kybernetes:* frontmatter name."
              failed = true
            end

            unless description.is_a?(String) && !description.strip.empty?
              warn "#{skill_file} must include a non-empty frontmatter description."
              failed = true
            end
          end

          exit(failed ? 1 : 0)
          RUBY

      - name: Require pressure scenarios for skills
        run: |
          count="$(find tests/pressure-scenarios -type f -name '*.md' | wc -l | tr -d ' ')"
          if [ "$count" -lt 1 ]; then
            echo "At least one pressure scenario is required before publishing skill behavior."
            exit 1
          fi

      - name: Require control-loop vocabulary
        run: |
          grep -RIl "Execution Profile" skills tests docs examples README.md >/dev/null
          grep -RIl "control record" skills tests docs examples README.md >/dev/null
          grep -RIl "loop readiness" skills tests docs examples README.md >/dev/null
          grep -RIl "loop altitude\\|stay, down, up, stack" skills tests docs examples README.md >/dev/null
          grep -RIl "HITL\\|Human-In-The-Loop" skills tests docs examples README.md >/dev/null
          grep -RIl "impediment" skills tests docs examples README.md >/dev/null

      - name: Validate runtime governance
        run: ruby tests/validate-runtime-governance.rb

      - name: Validate acceptance boundary
        run: ruby tests/validate-acceptance-boundary.rb

      - name: Validate skill naming
        run: ruby tests/validate-skill-naming.rb

      - name: Validate lazy governor kernel
        run: ruby tests/validate-lazy-governor.rb

      - name: Validate loop architect
        run: ruby tests/validate-loop-architect.rb

      - name: Validate workgraph
        run: ruby tests/validate-workgraph.rb

      - name: Validate activation bindings
        run: ruby tests/validate-activation-bindings.rb

      - name: Validate trajectory kernel
        run: ruby tests/validate-trajectory-kernel.rb

      - name: Validate trajectory readiness
        run: ruby tests/validate-trajectory-readiness.rb

      - name: Validate trajectory port
        run: ruby tests/validate-trajectory-port.rb

      - name: Validate runtime portability
        run: ruby tests/validate-runtime-portability.rb

      - name: Validate loop closeout
        run: ruby tests/validate-loop-closeout.rb

      - name: Validate independent verification
        run: ruby tests/validate-verify-run.rb

      - name: Validate learning capture
        run: ruby tests/validate-capture-learning.rb

      - name: Validate v0.1 release contract
        run: ruby tests/validate-v0.1-release.rb

      - name: Reject runtime-token leaks from core semantics
        run: |
          ruby <<'RUBY'
          core_files = [
            "skills/kybernetes-loop-governor/SKILL.md",
            "skills/kybernetes-loop-governor/README.md",
            "skills/kybernetes-loop-governor/references/goal-checklist.md",
            "skills/kybernetes-loop-governor/references/canonical-lifecycle.md",
            "skills/kybernetes-loop-governor/references/capability-negotiation.md",
            "skills/kybernetes-loop-governor/references/portable-core.md",
            "docs/architecture/l2-port-contracts.md",
            "tests/pressure-scenarios/README.md",
          ]

          runtime_tokens = [
            ["/goal", %r{(?<![\w.-])/goal(?![\w.-])}],
            ["/plan", %r{(?<![\w.-])/plan(?![\w.-])}],
            ["/loop", %r{(?<![\w.-])/loop(?![\w.-])}],
            ["/advisor", %r{(?<![\w.-])/advisor(?![\w.-])}],
            ["/batch", %r{(?<![\w.-])/batch(?![\w.-])}],
            ["/background", %r{(?<![\w.-])/background(?![\w.-])}],
            ["/fork", %r{(?<![\w.-])/fork(?![\w.-])}],
            ["/branch", %r{(?<![\w.-])/branch(?![\w.-])}],
            ["/rewind", %r{(?<![\w.-])/rewind(?![\w.-])}],
            ["plan mode", /\bplan mode\b/],
            ["routines", /\broutines\b/],
            ["Codex", /Codex/],
            ["Claude Code", /Claude Code/],
            ["Cursor", /Cursor/],
          ]

          failed = false

          core_files.each do |path|
            File.readlines(path, chomp: true).each_with_index do |line, index|
              runtime_tokens.each do |label, pattern|
                next unless line.match?(pattern)

                warn "#{path}:#{index + 1}: runtime token #{label.inspect} belongs in L3 binding references, not core semantics."
                failed = true
              end
            end
          end

          if failed
            warn "Move native availability, commands, app/cloud caveats, and runtime examples into references/codex.md or references/claude-code.md."
          end

          exit(failed ? 1 : 0)
          RUBY

      - name: Reject stale run artifact defaults
        run: |
          if grep -RIn \
            --exclude-dir=.git \
            --exclude-dir=.agent-runs \
            --exclude-dir=research \
            --exclude='validate-skills.yml' \
            -E "\\.agent-runs" skills docs examples tests README.md; then
            echo "Use .kybernetes/<slug>/ for Kybernetes run artifacts. .agent-runs may appear only in legacy cleanup context."
            exit 1
          fi

      - name: Reject committed Kybernetes run artifacts
        run: |
          if git ls-files '.kybernetes/*' | grep .; then
            echo ".kybernetes/ contains local run artifacts and must not be committed."
            exit 1
          fi

      - name: Reject committed Superpowers artifacts
        run: |
          if git ls-files '.superpowers/*' 'docs/superpowers/*' 'docs/implementation-plans/*' | grep .; then
            echo ".superpowers/, docs/superpowers/, and docs/implementation-plans/ must not be committed."
            exit 1
          fi
