<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1120 620" font-family="ui-sans-serif,Segoe UI,Helvetica,Arial,sans-serif">
  <defs>
    <marker id="a" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#8b949e"/></marker>
  </defs>
  <rect width="1120" height="620" fill="#0d1117"/>
  <text x="48" y="52" fill="#e6edf3" font-size="25" font-weight="600">Runtime-Adaptive Harness</text>
  <text x="48" y="80" fill="#8b949e" font-size="14">One canonical governor selects replaceable runtime actuators and sensors.</text>

  <rect x="390" y="120" width="340" height="92" rx="8" fill="#0d2a4d" stroke="#4d9fff" stroke-width="2"/>
  <text x="560" y="156" text-anchor="middle" fill="#e6edf3" font-size="19" font-weight="600">kybernetes:loop-governor</text>
  <text x="560" y="184" text-anchor="middle" fill="#9fb6d6" font-size="13">canonical control.md + evidence verification.md</text>

  <g fill="#161b22" stroke="#d29922">
    <rect x="60" y="280" width="220" height="72" rx="8"/><rect x="320" y="280" width="220" height="72" rx="8"/>
    <rect x="580" y="280" width="220" height="72" rx="8"/><rect x="840" y="280" width="220" height="72" rx="8"/>
  </g>
  <g fill="#e6edf3" font-size="15" text-anchor="middle" font-weight="600">
    <text x="170" y="311">loop-architect</text><text x="430" y="311">verify-run</text>
    <text x="690" y="311">capture-learning</text><text x="950" y="311">loop-closeout</text>
  </g>
  <g fill="#c9d1d9" font-size="12" text-anchor="middle">
    <text x="170" y="334">proposes execution contract</text><text x="430" y="334">can reject DONE</text>
    <text x="690" y="334">proposes constraints</text><text x="950" y="334">retires bounded machinery</text>
  </g>
  <g stroke="#8b949e" stroke-width="1.5" marker-end="url(#a)">
    <line x1="170" y1="280" x2="430" y2="205"/><line x1="430" y1="280" x2="500" y2="215"/>
    <line x1="690" y1="280" x2="620" y2="215"/><line x1="950" y1="280" x2="690" y2="205"/>
  </g>

  <rect x="100" y="430" width="920" height="116" rx="8" fill="#161b22" stroke="#3fb950"/>
  <text x="560" y="462" text-anchor="middle" fill="#e6edf3" font-size="17" font-weight="600">Negotiated Runtime Bindings</text>
  <text x="560" y="490" text-anchor="middle" fill="#9fb6a0" font-size="13">foreground turns · native goals · workers · peer tasks · schedules · events · notifications · portable files</text>
  <text x="560" y="518" text-anchor="middle" fill="#8b949e" font-size="12">Observed callable capability chooses the binding. Documentation and progress UI are advisory.</text>
  <line x1="560" y1="430" x2="560" y2="218" stroke="#3fb950" stroke-width="1.8" stroke-dasharray="6 4" marker-end="url(#a)"/>
  <text x="48" y="590" fill="#8b949e" font-size="12">Recoverable human, time, and event waits stay canonical and resumable; only verified terminal states may mirror natively.</text>
</svg>
